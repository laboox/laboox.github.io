  # About Section
  about:
    enable: true
    title: "About Me"
    image: "/images/avatar.jpg"
    content: |-
      I am a Software Engineer at **Google** focusing on cloud platform infrastructure. I work with machine learning workloads on high-scale computation systems.

      I received my PhD in Computer Science from **University of California, Irvine** by building a service platform for health research. The services were set to provide a solution for health researchers to collect and analyze longitudinal data while utilizing artificial intelligence for analysis and intervention. My doctoral project was divided between designing a service orchestration for long-term health studies and building a scalable infrastructure to host this service on. You can read more about it [here](/projects/zotcare).

      Previously, I worked at **Commure** as a Senior Software Engineer on the Strongline Pro product, where I developed distributed systems for real-time IoT safety systems and geo-location algorithms.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "TypeScript / Node.js"
        - "Java / Go / C++"
        - "TensorFlow / PyTorch"
        - "MongoDB / PostgreSQL / InfluxDB"
        - "GCP / AWS / Kubernetes / Docker"

  # Experience Section
  experience:
