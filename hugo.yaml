            date: "Oct 24 - Present"
            content: "Working on cloud platforms infrastructure for high-scale machine learning applications."
      - company: "Commure"
        companyUrl: "https://www.commure.com/"
        jobs:
          - name: "Senior Software Engineer"
            date: "Oct 23 - Oct 24"
            content: |
              - Led the performance and reliability of an Internet-of-Things hospital system for real-time asset tracking and nurse duress safety
              - Improved indoor location accuracy by more than 150% by incorporating Machine-learning, signal processing, and Kalman-Filter
              - Designed a robust and high-throughput safety infrastructure deployed in the largest hospital networks across the United States
      - company: "UC Irvine"
        companyUrl: "https://ics.uci.edu/"
        jobs:
          - name: "Research Software Engineer"
            date: "Sep 17 - Sep 23"
            content: |
              - Led, designed, and developed a cybernetics health service platform for remote healthcare monitoring and intervention
              - Serviced over 10 projects with more than 1500 participants in different fields: mental health, maternal well-being, elderly care, etc.
              - Achieved high performance in processing and storing high-frequency longitudinal healthcare data in micro-service server design
              - Improved participant engagement by developing a multi-platform dynamic mobile app for labeling and intervention
              - Designed web dashboards that enabled health providers to create data pipelines and machine learning engines without programming
              - Supervised diverse teams of more than 30 undergraduate researchers, exchange students, and visitor scholars
      - company: "Unity Technologies"
        companyUrl: "https://unity.com/"
